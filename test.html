<!DOCTYPE html>
<html>
<head>
    <title>VC Bot Test</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; }
        #messages { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 1rem; margin-bottom: 1rem; }
        .user { background: #e3f2fd; margin: 0.5rem 0; padding: 0.5rem; border-radius: 5px; }
        .bot { background: #f5f5f5; margin: 0.5rem 0; padding: 0.5rem; border-radius: 5px; }
        .system { background: #fff3e0; margin: 0.5rem 0; padding: 0.5rem; border-radius: 5px; font-style: italic; }
        .input-group { display: flex; gap: 0.5rem; }
        input, button { padding: 0.5rem; font-size: 1rem; }
        input { flex: 1; }
        button { cursor: pointer; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .reset-btn { background: #f0f0f0; }
    </style>
</head>
<body>
    <h2>VC Support Bot Test</h2>
    <div id="messages"></div>
    <div class="input-group">
        <input type="text" id="input" placeholder="Type your message...">
        <button id="sendBtn" onclick="send()">Send</button>
        <button id="resetBtn" class="reset-btn" onclick="resetConversation()">New Conversation</button>
    </div>

    <script>
        let sessionId = localStorage.getItem('testSessionId');
        if (!sessionId) {
            sessionId = crypto.randomUUID();
            localStorage.setItem('testSessionId', sessionId);
        }

        const messagesDiv = document.getElementById('messages');
        const inputField = document.getElementById('input');
        const sendButton = document.getElementById('sendBtn');
        const resetButton = document.getElementById('resetBtn');

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = role;
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function send() {
            const message = inputField.value.trim();
            if (!message) return;
            addMessage('user', message);
            inputField.value = '';
            inputField.disabled = true;
            sendButton.disabled = true;

            try {
                const response = await fetch('http://localhost:3000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, sessionId })
                });
                const data = await response.json();
                console.log('Server response:', data);
                addMessage('bot', data.response);
                if (data.ticketCreated) {
                    addMessage('system', '✅ Ticket created!');
                }
                if (data.conversationEnded) {
                    addMessage('system', '🔒 This conversation is complete. Please click "New Conversation" to start a new one.');
                    inputField.disabled = true;
                    sendButton.disabled = true;
                } else {
                    inputField.disabled = false;
                    sendButton.disabled = false;
                    inputField.focus();
                }
                if (data.rateLimited) {
                    addMessage('system', '⚠️ You have been rate limited. Please wait or start a new conversation later.');
                }
            } catch (err) {
                console.error('Fetch error:', err);
                addMessage('bot', '❌ Error: ' + err.message);
                inputField.disabled = false;
                sendButton.disabled = false;
                inputField.focus();
            }
        }

        async function resetConversation() {
            try {
                await fetch('http://localhost:3000/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId })
                });
            } catch (err) {
                console.warn('Reset endpoint error:', err);
            }
            sessionId = crypto.randomUUID();
            localStorage.setItem('testSessionId', sessionId);
            messagesDiv.innerHTML = '';
            addMessage('bot', 'Conversation reset. Hello again!');
            inputField.disabled = false;
            sendButton.disabled = false;
            inputField.focus();
        }

        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') send();
        });

        addMessage('bot', 'Hello! I am a support bot, and i will be assisting you today! Please describe your request below.');
    </script>
</body>
</html>
